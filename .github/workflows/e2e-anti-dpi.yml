name: Anti-DPI E2E Tests

on:
  push:
    branches: [claude/optimize-encryption-dpi-*]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      server_runner:
        description: 'Self-hosted runner label for the SERVER machine'
        required: true
        default: 'xray-server'
      client_runner:
        description: 'Self-hosted runner label for the CLIENT machine'
        required: true
        default: 'xray-client'
      server_ip:
        description: 'Public IP of the server (leave empty for auto-detect)'
        required: false
        default: ''
      private_key:
        description: 'REALITY private key (leave empty to auto-generate)'
        required: false
        default: ''
      public_key:
        description: 'REALITY public key (leave empty to auto-generate)'
        required: false
        default: ''
      server_duration:
        description: 'How long to keep server alive (minutes)'
        required: false
        default: '15'

jobs:
  # ── Job 1: Build the binary ─────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build xray (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o xray-linux-amd64 ./main

      - name: Generate REALITY keys
        id: keys
        run: |
          INPUT_PRIV="${{ github.event.inputs.private_key }}"
          INPUT_PUB="${{ github.event.inputs.public_key }}"
          if [ -n "$INPUT_PRIV" ] && [ -n "$INPUT_PUB" ]; then
            echo "Using provided REALITY keys"
            echo "private_key=$INPUT_PRIV" >> $GITHUB_OUTPUT
            echo "public_key=$INPUT_PUB" >> $GITHUB_OUTPUT
          else
            KEYPAIR=$(./xray-linux-amd64 x25519)
            echo "Raw output: $KEYPAIR"
            echo "private_key=$(echo "$KEYPAIR" | grep Private | awk '{print $NF}')" >> $GITHUB_OUTPUT
            echo "public_key=$(echo "$KEYPAIR" | grep Public | awk '{print $NF}')" >> $GITHUB_OUTPUT
          fi
          echo "Public key for client: $(grep public_key $GITHUB_OUTPUT 2>/dev/null || echo 'see outputs')"

      - uses: actions/upload-artifact@v4
        with:
          name: xray-binary
          path: xray-linux-amd64

    outputs:
      private_key: ${{ steps.keys.outputs.private_key }}
      public_key: ${{ steps.keys.outputs.public_key }}

  # ── Job 2: Local loopback test (no extra machines needed) ───────
  test-local:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: xray-binary

      - name: Prepare binary
        run: chmod +x xray-linux-amd64

      - name: Run local E2E tests
        env:
          XRAY_BIN: ./xray-linux-amd64
        run: ./testing/e2e/run_tests.sh --local

  # ── Job 3: Deploy server (stays alive while tests run) ──────────
  deploy-server:
    needs: build
    runs-on: ${{ github.event.inputs.server_runner || 'xray-server' }}
    timeout-minutes: 20
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xray-binary

      - name: Prepare binary
        run: chmod +x xray-linux-amd64

      - name: Prepare server config
        env:
          PRIVATE_KEY: ${{ needs.build.outputs.private_key }}
        run: |
          mkdir -p $HOME/xray-test
          cp xray-linux-amd64 $HOME/xray-test/xray
          chmod +x $HOME/xray-test/xray

          cat > $HOME/xray-test/config.json <<EOF
          {
            "log": {"loglevel": "info"},
            "inbounds": [{
              "listen": "0.0.0.0", "port": 10443, "protocol": "vless",
              "settings": {
                "clients": [{"id": "a1b2c3d4-e5f6-7890-abcd-ef1234567890", "flow": ""}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "tcp", "security": "reality",
                "realitySettings": {
                  "dest": "www.google.com:443",
                  "serverNames": ["www.google.com"],
                  "privateKey": "$PRIVATE_KEY",
                  "shortIds": ["abcd1234"]
                }
              }
            }],
            "outbounds": [{"protocol": "freedom", "tag": "direct"}]
          }
          EOF

      - name: Start Xray server
        run: |
          pkill -f 'xray-test/xray' 2>/dev/null || true
          sleep 1
          nohup $HOME/xray-test/xray run -c $HOME/xray-test/config.json \
            > $HOME/xray-test/server.log 2>&1 &
          XRAY_PID=$!
          sleep 3

          if ! kill -0 $XRAY_PID 2>/dev/null; then
            echo "ERROR: Xray server failed to start!"
            cat $HOME/xray-test/server.log
            exit 1
          fi

          echo "Server PID: $XRAY_PID"
          cat $HOME/xray-test/server.log || true

      - name: Report server IP
        id: server-ip
        run: |
          MANUAL_IP="${{ github.event.inputs.server_ip }}"
          if [ -n "$MANUAL_IP" ]; then
            IP="$MANUAL_IP"
            echo "Using manually specified IP: $IP"
          else
            IP=$(curl -s --max-time 5 https://ifconfig.me 2>/dev/null || curl -s --max-time 5 https://api.ipify.org 2>/dev/null || hostname -I | awk '{print $1}')
            echo "Auto-detected public IP: $IP"
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Server listening on $IP:10443"

      - name: Keep server alive for tests
        run: |
          echo "Keeping server alive while tests run..."
          echo "Will stay up for up to ${{ github.event.inputs.server_duration || '15' }} minutes."
          DURATION="${{ github.event.inputs.server_duration || '15' }}"
          LOOPS=$((DURATION * 6))
          for i in $(seq 1 $LOOPS); do
            if ! pgrep -f 'xray-test/xray' > /dev/null; then
              echo "Xray process died at iteration $i, restarting..."
              nohup $HOME/xray-test/xray run -c $HOME/xray-test/config.json \
                > $HOME/xray-test/server.log 2>&1 &
              sleep 2
            fi
            sleep 10
          done
          echo "Server keepalive finished."

    outputs:
      server_ip: ${{ steps.server-ip.outputs.ip }}

  # ── Job 4: Run tests from client runner (concurrent with server) ─
  test-remote:
    needs: [build]
    runs-on: ${{ github.event.inputs.client_runner || 'xray-client' }}
    # Server IP: use workflow input if available, otherwise default
    env:
      SERVER_IP_INPUT: ${{ github.event.inputs.server_ip }}
      PUBLIC_KEY: ${{ needs.build.outputs.public_key }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: xray-binary

      - name: Prepare binary
        run: chmod +x xray-linux-amd64

      - name: Determine server IP
        id: resolve-ip
        run: |
          if [ -n "$SERVER_IP_INPUT" ]; then
            echo "ip=$SERVER_IP_INPUT" >> $GITHUB_OUTPUT
            echo "Using workflow input IP: $SERVER_IP_INPUT"
          else
            # Default server IP - update this if your server changes
            echo "ip=77.90.8.199" >> $GITHUB_OUTPUT
            echo "Using default server IP: 77.90.8.199"
          fi

      - name: Wait for server to be ready
        env:
          SERVER_IP: ${{ steps.resolve-ip.outputs.ip }}
        run: |
          echo "Waiting for Xray server at $SERVER_IP:10443..."
          for i in $(seq 1 60); do
            if timeout 3 bash -c "echo | nc -w2 $SERVER_IP 10443" 2>/dev/null; then
              echo "Server is ready! (attempt $i)"
              exit 0
            fi
            echo "Waiting... attempt $i/60"
            sleep 5
          done
          echo "ERROR: Server not reachable after 5 minutes"
          exit 1

      - name: Start traffic capture
        env:
          SERVER_IP: ${{ steps.resolve-ip.outputs.ip }}
        run: |
          CAPTURE_FILE="/tmp/xray-e2e-capture.pcap"
          # Try tcpdump (may need CAP_NET_RAW)
          if command -v tcpdump &>/dev/null; then
            echo "Starting tcpdump capture to $CAPTURE_FILE..."
            nohup tcpdump -i any -w "$CAPTURE_FILE" host "$SERVER_IP" and port 10443 \
              > /tmp/tcpdump.log 2>&1 &
            TCPDUMP_PID=$!
            sleep 2
            if kill -0 $TCPDUMP_PID 2>/dev/null; then
              echo "tcpdump_pid=$TCPDUMP_PID" >> $GITHUB_OUTPUT
              echo "Capture running (PID $TCPDUMP_PID)"
            else
              echo "tcpdump failed to start (likely no permissions)"
              cat /tmp/tcpdump.log || true
              echo "Trying with sudo..."
              sudo nohup tcpdump -i any -w "$CAPTURE_FILE" host "$SERVER_IP" and port 10443 \
                > /tmp/tcpdump.log 2>&1 &
              TCPDUMP_PID=$!
              sleep 2
              if kill -0 $TCPDUMP_PID 2>/dev/null; then
                echo "tcpdump_pid=$TCPDUMP_PID" >> $GITHUB_OUTPUT
                echo "Capture running with sudo (PID $TCPDUMP_PID)"
              else
                echo "tcpdump unavailable even with sudo — skipping capture"
              fi
            fi
          else
            echo "tcpdump not installed — skipping capture"
          fi
        id: capture

      - name: Run E2E tests against remote server
        env:
          XRAY_BIN: ./xray-linux-amd64
          SERVER_IP: ${{ steps.resolve-ip.outputs.ip }}
        run: |
          echo "Server IP: $SERVER_IP"
          echo "Public key: $PUBLIC_KEY"

          # Patch client config with actual values
          sed -i "s|REPLACE_WITH_SERVER_IP|$SERVER_IP|g" testing/configs/client.json
          sed -i "s|REPLACE_WITH_GENERATED_PUBLIC_KEY|$PUBLIC_KEY|g" testing/configs/client.json

          echo "Client config:"
          cat testing/configs/client.json

          ./testing/e2e/run_tests.sh \
            --server "$SERVER_IP"

      - name: Stop traffic capture
        if: always()
        run: |
          TCPDUMP_PID="${{ steps.capture.outputs.tcpdump_pid }}"
          if [ -n "$TCPDUMP_PID" ]; then
            echo "Stopping tcpdump (PID $TCPDUMP_PID)..."
            kill "$TCPDUMP_PID" 2>/dev/null || sudo kill "$TCPDUMP_PID" 2>/dev/null || true
            sleep 2
            if [ -f /tmp/xray-e2e-capture.pcap ]; then
              SIZE=$(stat -c%s /tmp/xray-e2e-capture.pcap 2>/dev/null || echo 0)
              echo "Capture file size: $SIZE bytes"
            fi
          else
            echo "No tcpdump was running"
          fi

      - name: Upload traffic capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traffic-capture
          path: /tmp/xray-e2e-capture.pcap
          if-no-files-found: ignore

  # ── Job 5: Traffic analysis (post-test) ─────────────────────────
  analyze-traffic:
    needs: test-remote
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: traffic-capture
        continue-on-error: true

      - name: Install tshark
        run: sudo apt-get update && sudo apt-get install -y tshark

      - name: DPI Resistance Analysis
        if: hashFiles('xray-e2e-capture.pcap') != ''
        run: |
          PCAP="xray-e2e-capture.pcap"
          SCORE=100  # Start with perfect score, deduct for DPI-detectable patterns

          echo "╔══════════════════════════════════════════════════╗"
          echo "║         DPI RESISTANCE SCORE ANALYSIS            ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""

          # ── 1. Packet Size Entropy ──────────────────────────
          echo "=== 1. Packet Size Distribution ==="
          SIZES=$(tshark -r "$PCAP" -Y "tcp.len > 0" -T fields -e tcp.len 2>/dev/null)
          TOTAL=$(echo "$SIZES" | wc -l)
          UNIQUE=$(echo "$SIZES" | sort -u | wc -l)

          if [ "$TOTAL" -gt 0 ]; then
            DIVERSITY=$(echo "scale=1; $UNIQUE * 100 / $TOTAL" | bc)
            echo "Total data packets: $TOTAL"
            echo "Unique payload sizes: $UNIQUE"
            echo "Size diversity: ${DIVERSITY}%"
            echo "$SIZES" | sort -n | uniq -c | sort -rn | head -10

            # Deduct if diversity is low (DPI can fingerprint fixed patterns)
            DIV_INT=${DIVERSITY%.*}
            if [ "$DIV_INT" -lt 10 ]; then
              PENALTY=25
              echo "⚠ LOW diversity (<10%) — easily fingerprinted. Penalty: -$PENALTY"
              SCORE=$((SCORE - PENALTY))
            elif [ "$DIV_INT" -lt 30 ]; then
              PENALTY=10
              echo "⚠ MODERATE diversity (<30%). Penalty: -$PENALTY"
              SCORE=$((SCORE - PENALTY))
            else
              echo "✓ Good size diversity"
            fi
          fi
          echo ""

          # ── 2. Record-TCP Alignment Check ───────────────────
          echo "=== 2. TLS Record / TCP Segment Alignment ==="
          # Count packets whose size matches common TLS record sizes (±5 bytes of multiples)
          ALIGNED=0
          for s in 1400 1448 1460 8192 4096 16384; do
            LO=$((s - 5))
            HI=$((s + 5))
            COUNT=$(echo "$SIZES" | awk -v lo="$LO" -v hi="$HI" '$1 >= lo && $1 <= hi' | wc -l)
            ALIGNED=$((ALIGNED + COUNT))
          done
          if [ "$TOTAL" -gt 0 ]; then
            ALIGN_PCT=$(echo "scale=1; $ALIGNED * 100 / $TOTAL" | bc)
            echo "Packets near standard sizes: $ALIGNED/${TOTAL} (${ALIGN_PCT}%)"
            ALIGN_INT=${ALIGN_PCT%.*}
            if [ "$ALIGN_INT" -gt 50 ]; then
              PENALTY=20
              echo "⚠ HIGH alignment to standard sizes — DPI detectable. Penalty: -$PENALTY"
              SCORE=$((SCORE - PENALTY))
            elif [ "$ALIGN_INT" -gt 25 ]; then
              PENALTY=10
              echo "⚠ MODERATE alignment. Penalty: -$PENALTY"
              SCORE=$((SCORE - PENALTY))
            else
              echo "✓ Good scatter — records don't align with TCP segments"
            fi
          fi
          echo ""

          # ── 3. Inter-Arrival Time Analysis ──────────────────
          echo "=== 3. Timing Analysis ==="
          TIMES=$(tshark -r "$PCAP" -Y "tcp.len > 0" \
            -T fields -e frame.time_delta_displayed 2>/dev/null | head -200)
          ZERO_DELTA=$(echo "$TIMES" | awk '$1 < 0.001' | wc -l)
          TOTAL_TIMES=$(echo "$TIMES" | wc -l)

          if [ "$TOTAL_TIMES" -gt 0 ]; then
            BURST_PCT=$(echo "scale=1; $ZERO_DELTA * 100 / $TOTAL_TIMES" | bc)
            echo "Near-zero inter-arrival (<1ms): $ZERO_DELTA/${TOTAL_TIMES} (${BURST_PCT}%)"
            BURST_INT=${BURST_PCT%.*}
            if [ "$BURST_INT" -gt 80 ]; then
              PENALTY=15
              echo "⚠ HIGH burst ratio — looks like tunneled traffic. Penalty: -$PENALTY"
              SCORE=$((SCORE - PENALTY))
            else
              echo "✓ Timing looks natural"
            fi
          fi
          echo ""

          # ── 4. TLS Fingerprint Check ────────────────────────
          echo "=== 4. TLS Fingerprint ==="
          JA3=$(tshark -r "$PCAP" -Y "tls.handshake.type == 1" \
            -T fields -e tls.handshake.ja3_full 2>/dev/null | head -5)
          if [ -n "$JA3" ]; then
            JA3_UNIQUE=$(echo "$JA3" | sort -u | wc -l)
            JA3_TOTAL=$(echo "$JA3" | wc -l)
            echo "JA3 fingerprints: $JA3_TOTAL total, $JA3_UNIQUE unique"
            echo "$JA3" | head -3
            if [ "$JA3_UNIQUE" -eq 1 ] && [ "$JA3_TOTAL" -gt 3 ]; then
              PENALTY=10
              echo "⚠ Single JA3 fingerprint across all connections. Penalty: -$PENALTY"
              SCORE=$((SCORE - PENALTY))
            else
              echo "✓ JA3 variation present"
            fi
          else
            echo "✓ No JA3 data (REALITY/uTLS fingerprint masking working)"
          fi
          echo ""

          # ── 5. Repeated Pattern Detection ───────────────────
          echo "=== 5. Repeated Byte Patterns ==="
          # Check if many packets start with the same bytes (fingerprint)
          FIRST_BYTES=$(tshark -r "$PCAP" -Y "tcp.len > 5" \
            -T fields -e tcp.payload 2>/dev/null | cut -c1-10 | sort | uniq -c | sort -rn | head -5)
          if [ -n "$FIRST_BYTES" ]; then
            TOP_COUNT=$(echo "$FIRST_BYTES" | head -1 | awk '{print $1}')
            if [ "$TOTAL" -gt 0 ] && [ "$TOP_COUNT" -gt $((TOTAL / 3)) ]; then
              PENALTY=15
              echo "⚠ Dominant repeated header pattern. Penalty: -$PENALTY"
              SCORE=$((SCORE - PENALTY))
            else
              echo "✓ No dominant byte patterns"
            fi
            echo "$FIRST_BYTES"
          fi
          echo ""

          # ── Final Score ─────────────────────────────────────
          echo "╔══════════════════════════════════════════════════╗"
          if [ "$SCORE" -ge 80 ]; then
            echo "║  DPI RESISTANCE SCORE: ${SCORE}/100 — EXCELLENT     ║"
          elif [ "$SCORE" -ge 60 ]; then
            echo "║  DPI RESISTANCE SCORE: ${SCORE}/100 — GOOD          ║"
          elif [ "$SCORE" -ge 40 ]; then
            echo "║  DPI RESISTANCE SCORE: ${SCORE}/100 — MODERATE      ║"
          else
            echo "║  DPI RESISTANCE SCORE: ${SCORE}/100 — NEEDS WORK    ║"
          fi
          echo "╚══════════════════════════════════════════════════╝"

      - name: No capture available
        if: hashFiles('xray-e2e-capture.pcap') == ''
        run: echo "No traffic capture available — skipping DPI analysis"
